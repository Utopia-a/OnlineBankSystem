server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: banking-auth
  datasource:
    url: jdbc:mysql://localhost:3306/banking_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# JWT 配置
jwt:
  secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437  # 至少256位
  access-token-expiration: 3600000       # 1小时 (ms)
  refresh-token-expiration: 604800000    # 7天 (ms)

# OTP 配置
otp:
  expiration: 300000   # 5分钟 (ms)
  length: 6

# Springdoc / Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    com.banking: DEBUG
    org.springframework.security: INFO
