<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 网上银行系统</title>
    <link rel="stylesheet" th:href="@{/static/css/common.css}">
    <style>
        body {
            background: linear-gradient(135deg, #1a3a5c 0%, #2d6a9f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .register-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 460px;
            max-width: 100%;
        }
        .register-card h2 {
            text-align: center;
            color: #1a3a5c;
            font-size: 22px;
            margin: 0 0 28px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group.full { grid-column: 1 / -1; }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 11px 13px;
            border: 1.5px solid #ddd;
            border-radius: 7px;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: #2d6a9f; }
        .form-group .hint {
            font-size: 11px;
            color: #aaa;
            margin-top: 4px;
        }
        .btn-register, .btn-verify {
            width: 100%;
            padding: 13px;
            background: #2d6a9f;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-register:hover, .btn-verify:hover { background: #1a3a5c; }
        .links {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #888;
        }
        .links a { color: #2d6a9f; text-decoration: none; }
        .error-msg, .success-msg {
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 14px;
            display: none;
        }
        .error-msg {
            background: #fff0f0;
            color: #d32f2f;
            border: 1px solid #ffc5c5;
        }
        .success-msg {
            background: #f0fff4;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }
        .email-display {
            background: #f5f8fc;
            border: 1px solid #dde8f4;
            border-radius: 8px;
            padding: 12px 16px;
            text-align: center;
            font-size: 14px;
            color: #1a3a5c;
            margin-bottom: 16px;
        }
        .dev-hint {
            background: #fff8e6;
            border: 1px solid #ffe082;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 12px;
            color: #856404;
            margin-bottom: 16px;
        }
        .otp-row { display: flex; gap: 10px; }
        .otp-row input {
            flex: 1;
            padding: 11px 13px;
            border: 1.5px solid #ddd;
            border-radius: 7px;
            font-size: 18px;
            letter-spacing: 4px;
            text-align: center;
        }
        .btn-resend {
            padding: 11px 14px;
            background: #eef4fb;
            color: #2d6a9f;
            border: 1.5px solid #2d6a9f;
            border-radius: 7px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }
        .btn-resend:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>
<div class="register-card">
    <h2 id="pageTitle">🏦 开通网上银行</h2>
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div id="registerStep">
        <div class="form-row">
            <div class="form-group">
                <label>用户名 <span style="color:red">*</span></label>
                <input type="text" id="username" placeholder="4-20位字母数字">
                <div class="hint">仅限字母、数字和下划线</div>
            </div>
            <div class="form-group">
                <label>真实姓名 <span style="color:red">*</span></label>
                <input type="text" id="realName" placeholder="请输入真实姓名">
            </div>
            <div class="form-group">
                <label>登录密码 <span style="color:red">*</span></label>
                <input type="password" id="password" placeholder="至少8位，含大小写和数字">
                <div class="hint">须包含大写字母、小写字母和数字</div>
            </div>
            <div class="form-group">
                <label>确认密码 <span style="color:red">*</span></label>
                <input type="password" id="confirmPassword" placeholder="再次输入密码">
            </div>
            <div class="form-group">
                <label>手机号 <span style="color:red">*</span></label>
                <input type="tel" id="phone" placeholder="11位手机号" maxlength="11">
            </div>
            <div class="form-group">
                <label>电子邮箱</label>
                <input type="email" id="email" placeholder="选填，默认 username@bank.local">
            </div>
            <div class="form-group full">
                <label>身份证号 <span style="color:red">*</span></label>
                <input type="text" id="idCard" placeholder="18位居民身份证号码" maxlength="18">
            </div>
        </div>
        <button class="btn-register" onclick="register()">立即注册</button>
        <div class="links">已有账户？<a href="/login">返回登录</a></div>
    </div>

    <div id="verifyStep" style="display:none">
        <div class="email-display" id="verifyEmailDisplay"></div>
        <div class="dev-hint">开发环境：验证码会输出在服务端控制台，格式为 <code>[OTP 模拟发送]</code></div>
        <div class="form-group">
            <label>邮箱验证码 <span style="color:red">*</span></label>
            <div class="otp-row">
                <input type="text" id="otpCode" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
                <button type="button" class="btn-resend" id="btnResend" onclick="resendOtp()">重新发送</button>
            </div>
        </div>
        <button class="btn-verify" onclick="verifyEmail()">验证并激活账户</button>
        <div class="links">稍后验证？<a href="/login">先去登录</a></div>
    </div>
</div>

<script th:src="@{/static/js/api.js}"></script>
<script th:src="@{/static/js/auth-verify.js}"></script>
<script>
    let verifyEmailTarget = '';
    let registeredUsername = '';

    async function register() {
        const username = document.getElementById('username').value.trim();
        const realName = document.getElementById('realName').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const phone = document.getElementById('phone').value.trim();
        const email = document.getElementById('email').value.trim();
        const idCard = document.getElementById('idCard').value.trim();

        if (!username || !realName || !password || !phone || !idCard) {
            showError('请填写所有必填项');
            return;
        }
        if (password !== confirmPassword) {
            showError('两次输入的密码不一致');
            return;
        }
        if (password.length < 8 || !/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).+$/.test(password)) {
            showError('密码至少8位，且须包含大写字母、小写字母和数字');
            return;
        }
        if (email && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) {
            showError('邮箱格式不正确，请留空或填写有效邮箱');
            return;
        }
        if (!/^1[3-9]\d{9}$/.test(phone)) {
            showError('请输入正确的手机号');
            return;
        }
        if (idCard.length !== 18) {
            showError('身份证号应为18位');
            return;
        }

        try {
            const data = await apiPost('/api/auth/register', {
                username, realName, password, confirmPassword, phone,
                email: email || undefined, idCard
            });
            registeredUsername = data.username || username;
            verifyEmailTarget = data.email;
            showVerifyStep(data);
        } catch (e) {
            showError(e.message || '注册失败，请稍后重试');
        }
    }

    function showVerifyStep(data) {
        document.getElementById('registerStep').style.display = 'none';
        document.getElementById('verifyStep').style.display = 'block';
        document.getElementById('pageTitle').textContent = '📧 验证您的邮箱';
        document.getElementById('verifyEmailDisplay').textContent =
            '验证码已发送至 ' + (data.maskedEmail || data.email);
        document.getElementById('errorMsg').style.display = 'none';
        document.getElementById('otpCode').value = '';
        document.getElementById('otpCode').focus();
    }

    async function verifyEmail() {
        const code = document.getElementById('otpCode').value.trim();
        if (!/^\d{6}$/.test(code)) {
            showError('请输入 6 位数字验证码');
            return;
        }
        try {
            await submitEmailVerify(verifyEmailTarget, code);
            showSuccess('邮箱验证成功！即将跳转到登录页…');
            setTimeout(() => {
                window.location.href = '/login?verified=1';
            }, 1500);
        } catch (e) {
            showError(e.message || '验证失败，请检查验证码');
        }
    }

    async function resendOtp() {
        const btn = document.getElementById('btnResend');
        if (btn.disabled) return;
        try {
            await submitResendOtp(verifyEmailTarget);
            showSuccess('验证码已重新发送（开发环境请查看控制台）');
            startResendCooldown(btn, 60);
        } catch (e) {
            showError(e.message || '发送失败');
        }
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
        document.getElementById('successMsg').style.display = 'none';
    }

    function showSuccess(msg) {
        const el = document.getElementById('successMsg');
        el.textContent = msg;
        el.style.display = 'block';
        document.getElementById('errorMsg').style.display = 'none';
    }

    document.getElementById('otpCode').addEventListener('keydown', e => {
        if (e.key === 'Enter') verifyEmail();
    });
</script>
</body>
</html>
