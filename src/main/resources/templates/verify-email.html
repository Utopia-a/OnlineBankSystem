<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邮箱验证 - 网上银行系统</title>
    <link rel="stylesheet" th:href="@{/static/css/common.css}">
    <style>
        body {
            background: linear-gradient(135deg, #1a3a5c 0%, #2d6a9f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .verify-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 420px;
            max-width: 100%;
        }
        .verify-card h2 {
            text-align: center;
            color: #1a3a5c;
            font-size: 22px;
            margin: 0 0 8px;
        }
        .verify-card .subtitle {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 24px;
        }
        .email-display {
            background: #f5f8fc;
            border: 1px solid #dde8f4;
            border-radius: 8px;
            padding: 12px 16px;
            text-align: center;
            font-size: 15px;
            color: #1a3a5c;
            margin-bottom: 20px;
        }
        .dev-hint {
            background: #fff8e6;
            border: 1px solid #ffe082;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 12px;
            color: #856404;
            margin-bottom: 18px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .otp-row { display: flex; gap: 10px; }
        .otp-row input {
            flex: 1;
            padding: 12px 14px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 18px;
            letter-spacing: 6px;
            text-align: center;
            outline: none;
        }
        .otp-row input:focus { border-color: #2d6a9f; }
        .btn-resend {
            padding: 12px 14px;
            background: #eef4fb;
            color: #2d6a9f;
            border: 1.5px solid #2d6a9f;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }
        .btn-resend:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-verify {
            width: 100%;
            padding: 13px;
            background: #2d6a9f;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-verify:hover { background: #1a3a5c; }
        .links {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #888;
        }
        .links a { color: #2d6a9f; text-decoration: none; }
        .error-msg, .success-msg {
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 14px;
            display: none;
        }
        .error-msg {
            background: #fff0f0;
            color: #d32f2f;
            border: 1px solid #ffc5c5;
        }
        .success-msg {
            background: #f0fff4;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }
        .loading { text-align: center; color: #888; padding: 40px 0; }
    </style>
</head>
<body>
<div class="verify-card">
    <h2>📧 邮箱验证</h2>
    <p class="subtitle">请输入发送到邮箱的 6 位验证码</p>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div id="loadingArea" class="loading">正在加载账户信息…</div>

    <div id="verifyArea" style="display:none">
        <div class="email-display" id="emailDisplay"></div>
        <div class="dev-hint">开发环境：验证码会输出在服务端控制台，格式为 <code>[OTP 模拟发送]</code></div>

        <div class="form-group">
            <label>验证码</label>
            <div class="otp-row">
                <input type="text" id="otpCode" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
                <button type="button" class="btn-resend" id="btnResend" onclick="resendOtp()">重新发送</button>
            </div>
        </div>

        <button type="button" class="btn-verify" onclick="verifyEmail()">验证并激活账户</button>
        <div class="links">验证完成后 <a href="/login">前往登录</a></div>
    </div>
</div>

<script th:src="@{/static/js/api.js}"></script>
<script th:src="@{/static/js/auth-verify.js}"></script>
<script>
    let verifyEmailTarget = '';

    document.addEventListener('DOMContentLoaded', async () => {
        const params = new URLSearchParams(window.location.search);
        const username = params.get('username');
        if (!username) {
            hideLoading();
            showError('缺少用户名参数，请从登录或注册页面进入');
            return;
        }
        try {
            const data = await apiGet('/api/auth/pending-verification?username=' + encodeURIComponent(username));
            verifyEmailTarget = data.email;
            document.getElementById('emailDisplay').textContent =
                '验证码已发送至 ' + (data.maskedEmail || data.email);
            hideLoading();
            document.getElementById('verifyArea').style.display = 'block';
            document.getElementById('otpCode').focus();
        } catch (e) {
            hideLoading();
            showError(e.message || '无法加载验证信息');
        }
    });

    async function verifyEmail() {
        const code = document.getElementById('otpCode').value.trim();
        if (!/^\d{6}$/.test(code)) {
            showError('请输入 6 位数字验证码');
            return;
        }
        try {
            await submitEmailVerify(verifyEmailTarget, code);
            showSuccess('邮箱验证成功！即将跳转到登录页…');
            setTimeout(() => { window.location.href = '/login'; }, 1500);
        } catch (e) {
            showError(e.message || '验证失败');
        }
    }

    async function resendOtp() {
        const btn = document.getElementById('btnResend');
        if (btn.disabled) return;
        try {
            await submitResendOtp(verifyEmailTarget);
            showSuccess('验证码已重新发送，请查收邮箱（开发环境请查看控制台）');
            startResendCooldown(btn, 60);
        } catch (e) {
            showError(e.message || '发送失败');
        }
    }

    function hideLoading() {
        document.getElementById('loadingArea').style.display = 'none';
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
        document.getElementById('successMsg').style.display = 'none';
    }

    function showSuccess(msg) {
        const el = document.getElementById('successMsg');
        el.textContent = msg;
        el.style.display = 'block';
        document.getElementById('errorMsg').style.display = 'none';
    }

    document.getElementById('otpCode').addEventListener('keydown', e => {
        if (e.key === 'Enter') verifyEmail();
    });
</script>
</body>
</html>
