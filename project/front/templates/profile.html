<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息 - 网上银行系统</title>
    <link rel="stylesheet" th:href="@{/static/css/common.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="page-container page-narrow-md">
    <div class="page-header">
        <p class="caption-upper">Profile</p>
        <h2>个人信息</h2>
        <p class="subtitle">查看并管理您的账户信息</p>
    </div>

    <div class="card">
        <div class="profile-hero">
            <div class="profile-avatar">👤</div>
            <div>
                <div id="profileName" class="display-md" style="font-size:1.35rem;margin-bottom:0.25rem"></div>
                <div id="profileRole" class="subtitle"></div>
            </div>
        </div>

        <div class="account-detail-body" style="margin-bottom:0">
            <div class="detail-item">
                <span class="detail-label">用户名</span>
                <span class="detail-value" id="pUsername">-</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">真实姓名</span>
                <span class="detail-value" id="pRealName">-</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">用户 ID</span>
                <span class="detail-value mono" id="pUserId">-</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">角色</span>
                <span class="detail-value" id="pRole">-</span>
            </div>
        </div>

        <div class="account-detail-actions" style="border-top:1px solid var(--hairline);margin-top:1.5rem;padding-top:1.25rem">
            <span class="section-title" style="margin:0;flex:1;font-size:1rem">安全设置</span>
            <button class="btn btn-secondary btn-sm" onclick="alert('修改密码功能请联系成员B实现')">修改密码</button>
            <button class="btn btn-secondary btn-sm" onclick="alert('OTP 设置请联系成员B实现')">OTP 设置</button>
        </div>
    </div>
</div>

<script th:src="@{/static/js/api.js}"></script>
<script th:src="@{/static/js/app.js}"></script>
<script>
    const userInfo = JSON.parse(localStorage.getItem('userInfo') || '{}');
    document.getElementById('profileName').textContent = userInfo.realName || userInfo.username || '-';
    document.getElementById('profileRole').textContent = userInfo.role === 'ROLE_ADMIN' || userInfo.role === 'ADMIN' ? '系统管理员' : '普通用户';
    document.getElementById('pUsername').textContent  = userInfo.username || '-';
    document.getElementById('pRealName').textContent  = userInfo.realName || '-';
    document.getElementById('pUserId').textContent    = userInfo.userId   || '-';
    document.getElementById('pRole').textContent      = (userInfo.role === 'ROLE_ADMIN' || userInfo.role === 'ADMIN') ? '管理员' : '普通用户';
</script>
</body>
</html>
