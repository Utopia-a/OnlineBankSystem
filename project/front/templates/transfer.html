<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>转账汇款 - 网上银行系统</title>
    <link rel="stylesheet" th:href="@{/static/css/common.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="page-container page-narrow">
    <div class="page-header">
        <p class="caption-upper">Transfer</p>
        <h2>转账汇款</h2>
        <p class="subtitle">安全快速，实时到账</p>
    </div>

    <div class="card">
        <div class="form-group">
            <label>付款账户</label>
            <select id="fromAccount" class="form-control" onchange="updateBalance()">
                <option value="">-- 请选择付款账户 --</option>
            </select>
            <div id="fromBalance" class="hint"></div>
        </div>

        <div class="form-group">
            <label>收款账户号</label>
            <input type="text" id="toAccount" class="form-control" placeholder="请输入对方账户号（以 ACC 开头）" maxlength="20">
            <div class="hint">请填写收款方的银行账户号（如 ACC202406110000002），不要填写交易流水号（TXN 开头）</div>
        </div>

        <div class="form-group">
            <label>转账金额（元）</label>
            <input type="number" id="amount" class="form-control" placeholder="请输入金额" min="0.01" max="1000000" step="0.01"
                   oninput="checkOtpRequired()">
        </div>

        <div class="form-group">
            <label>备注（选填）</label>
            <input type="text" id="remark" class="form-control" placeholder="如：房租、餐费等" maxlength="100">
        </div>

        <div class="form-group" id="otpGroup" style="display:none">
            <label>邮箱验证码 <span style="color:red">*</span> <span style="color:#888;font-size:12px">（超过 ¥5000 需验证）</span></label>
            <div style="display:flex;gap:10px">
                <input type="text" id="otpCode" class="form-control" placeholder="6位验证码" maxlength="6" style="flex:1">
                <button type="button" class="btn btn-secondary" onclick="sendOtp()" style="white-space:nowrap">发送验证码</button>
            </div>
            <div class="hint">验证码将发送至您注册时绑定的邮箱；开发环境请查看服务端控制台 <code>[OTP 模拟发送]</code></div>
        </div>

        <div class="transfer-summary" id="summary" style="display:none">
            <div class="summary-row"><span>付款账户：</span><span id="summaryFrom">-</span></div>
            <div class="summary-row"><span>收款账户：</span><span id="summaryTo">-</span></div>
            <div class="summary-row"><span>转账金额：</span><span id="summaryAmount" class="amount-out">-</span></div>
        </div>

        <div class="error-msg" id="errorMsg" style="display:none"></div>
        <div class="success-msg" id="successMsg" style="display:none"></div>

        <div class="form-actions">
            <a href="/dashboard" class="btn btn-secondary">取消</a>
            <button type="button" class="btn btn-primary" onclick="confirmTransfer()">确认转账</button>
        </div>
    </div>
</div>

<script th:src="@{/static/js/api.js}"></script>
<script th:src="@{/static/js/app.js}"></script>
<script>
    let myAccounts = [];

    async function init() {
        try {
            myAccounts = await apiGet('/api/accounts/my');
            const select = document.getElementById('fromAccount');
            const activeAccounts = getActiveAccounts(myAccounts);
            if (!activeAccounts.length) {
                showError('暂无可用付款账户，冻结账户不能转账');
                return;
            }
            activeAccounts.forEach(a => {
                const opt = document.createElement('option');
                opt.value = a.accountNo;
                const typeLabel = a.accountType === 'SAVINGS' ? '储蓄' : (a.accountType === 'CHECKING' ? '活期' : a.accountType);
                opt.textContent = a.accountNo + '（' + typeLabel + ' · ¥' + formatAmount(a.balance) + '）';
                opt.dataset.balance = a.balance;
                select.appendChild(opt);
            });
        } catch(e) {
            showError('账户加载失败：' + e.message);
        }
    }

    function updateBalance() {
        const select = document.getElementById('fromAccount');
        const opt = select.options[select.selectedIndex];
        if (opt && opt.dataset.balance) {
            document.getElementById('fromBalance').textContent = '可用余额：¥' + formatAmount(opt.dataset.balance);
        } else {
            document.getElementById('fromBalance').textContent = '';
        }
    }

    const LARGE_TRANSFER_THRESHOLD = 5000;
    let otpSending = false;

    function checkOtpRequired() {
        const raw = document.getElementById('amount').value;
        const amount = parseFloat(raw);
        const group = document.getElementById('otpGroup');
        if (!raw || isNaN(amount)) {
            return;
        }
        group.style.display = amount > LARGE_TRANSFER_THRESHOLD ? 'block' : 'none';
    }

    async function sendOtp() {
        if (otpSending) return;
        const amount = parseFloat(document.getElementById('amount').value);
        if (!amount || isNaN(amount) || amount <= LARGE_TRANSFER_THRESHOLD) {
            showError('请先输入超过 ¥5000 的转账金额');
            return;
        }
        otpSending = true;
        const btn = document.querySelector('#otpGroup button');
        if (btn) btn.disabled = true;
        hideSuccess();
        try {
            await apiFetch('/api/transactions/transfer/send-otp', {
                method: 'POST',
                body: '{}',
                suppressAuthRedirect: true
            });
            showSuccess('验证码已发送至您的注册邮箱。开发环境请在后端控制台查找 [OTP 模拟发送] 日志');
        } catch (e) {
            if (e.message.includes('登录已过期')) {
                showError('登录已过期，请重新登录后再试');
                setTimeout(() => { window.location.href = '/login?reason=expired'; }, 1500);
            } else {
                showError('发送失败：' + e.message);
            }
        } finally {
            otpSending = false;
            if (btn) btn.disabled = false;
        }
    }

    async function confirmTransfer() {
        const fromAccountNo = document.getElementById('fromAccount').value;
        const toAccountNo = document.getElementById('toAccount').value.trim();
        const amount = parseFloat(document.getElementById('amount').value);
        const remark = document.getElementById('remark').value.trim();
        const otpCode = document.getElementById('otpCode').value.trim();

        if (!fromAccountNo) { showError('请选择付款账户'); return; }
        if (!toAccountNo) { showError('请输入收款账户号'); return; }
        const toAccountUpper = toAccountNo.toUpperCase();
        if (toAccountUpper.startsWith('TXN')) {
            showError('您输入的是交易流水号，请填写以 ACC 开头的收款账户号');
            return;
        }
        if (!toAccountUpper.startsWith('ACC')) {
            showError('收款账户号格式错误，应以 ACC 开头');
            return;
        }
        if (fromAccountNo.toUpperCase() === toAccountUpper) { showError('付款账户和收款账户不能相同'); return; }
        if (!amount || amount <= 0) { showError('请输入正确的转账金额'); return; }
        if (amount > LARGE_TRANSFER_THRESHOLD && !otpCode) {
            showError('大额转账需要输入邮箱验证码，请先点击「发送验证码」');
            return;
        }

        if (!confirm(`确认转账 ¥${formatAmount(amount)} 至账户 ${toAccountNo}？`)) return;

        try {
            const result = await apiPost('/api/transactions/transfer', {
                fromAccountNo, toAccountNo: toAccountUpper, amount, remark: remark || undefined, otpCode: otpCode || undefined
            });
            alert('转账成功！交易ID：' + result.transactionId);
            window.location.href = '/dashboard';
        } catch(e) {
            showError('转账失败：' + e.message);
        }
    }

    function showError(msg) {
        hideSuccess();
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
    }

    function showSuccess(msg) {
        hideError();
        const el = document.getElementById('successMsg');
        el.textContent = msg;
        el.style.display = 'block';
    }

    function hideError() {
        document.getElementById('errorMsg').style.display = 'none';
    }

    function hideSuccess() {
        document.getElementById('successMsg').style.display = 'none';
    }

    init();
</script>
</body>
</html>
