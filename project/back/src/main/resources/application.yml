server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: always

spring:
  application:
    name: online-bank-system
  datasource:
    url: jdbc:mysql://localhost:3306/banking_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: wzb5698741230?
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
