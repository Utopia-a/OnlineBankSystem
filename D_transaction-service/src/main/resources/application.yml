server:
  port: 8083
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: transaction-service
  datasource:
    url: jdbc:mysql://localhost:3306/online_bank?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        default_batch_fetch_size: 100

# JWT 配置（与成员B共享密钥）
jwt:
  secret: your-256-bit-secret-key-here-must-be-at-least-32-characters
  expiration: 86400000   # 24小时（毫秒）

# 业务规则配置
transaction:
  transfer:
    daily-limit: 500000.00      # 单日转账限额
    single-limit: 100000.00     # 单笔转账限额
    min-amount: 0.01            # 最小转账金额
  deposit:
    max-amount: 500000.00       # 单笔最大存款
    min-amount: 0.01
  withdraw:
    daily-limit: 50000.00       # 单日取款限额
    single-limit: 20000.00      # 单笔取款限额
    min-amount: 0.01

# Swagger UI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    com.bank.transaction: DEBUG
    org.springframework.transaction: DEBUG
