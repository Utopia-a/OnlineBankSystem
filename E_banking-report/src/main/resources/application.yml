server:
  port: 8085
  servlet:
    context-path: /api

spring:
  application:
    name: banking-report
  datasource:
    url: jdbc:mysql://localhost:3306/banking_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none          # 本模块只读，不主动建表（表由成员D创建）
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# JWT（与成员B保持一致）
jwt:
  secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
  access-token-expiration: 3600000

# 导出文件配置
export:
  max-rows: 50000          # 单次导出最大行数
  temp-dir: /tmp/banking   # 临时文件目录（PDF等）

# Springdoc / Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

logging:
  level:
    com.banking: DEBUG
    org.springframework.security: INFO
