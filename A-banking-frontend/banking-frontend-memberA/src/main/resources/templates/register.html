<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 网上银行系统</title>
    <link rel="stylesheet" th:href="@{/static/css/common.css}">
    <style>
        body {
            background: linear-gradient(135deg, #1a3a5c 0%, #2d6a9f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .register-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 460px;
            max-width: 100%;
        }
        .register-card h2 {
            text-align: center;
            color: #1a3a5c;
            font-size: 22px;
            margin: 0 0 28px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group.full { grid-column: 1 / -1; }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 11px 13px;
            border: 1.5px solid #ddd;
            border-radius: 7px;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: #2d6a9f; }
        .form-group .hint {
            font-size: 11px;
            color: #aaa;
            margin-top: 4px;
        }
        .btn-register {
            width: 100%;
            padding: 13px;
            background: #2d6a9f;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-register:hover { background: #1a3a5c; }
        .links {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #888;
        }
        .links a { color: #2d6a9f; text-decoration: none; }
        .error-msg {
            background: #fff0f0;
            color: #d32f2f;
            border: 1px solid #ffc5c5;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 14px;
            display: none;
        }
    </style>
</head>
<body>
<div class="register-card">
    <h2>🏦 开通网上银行</h2>
    <div class="error-msg" id="errorMsg"></div>

    <div class="form-row">
        <div class="form-group">
            <label>用户名 <span style="color:red">*</span></label>
            <input type="text" id="username" placeholder="4-20位字母数字">
            <div class="hint">仅限字母、数字和下划线</div>
        </div>
        <div class="form-group">
            <label>真实姓名 <span style="color:red">*</span></label>
            <input type="text" id="realName" placeholder="请输入真实姓名">
        </div>
        <div class="form-group">
            <label>登录密码 <span style="color:red">*</span></label>
            <input type="password" id="password" placeholder="6-32位密码">
        </div>
        <div class="form-group">
            <label>确认密码 <span style="color:red">*</span></label>
            <input type="password" id="confirmPassword" placeholder="再次输入密码">
        </div>
        <div class="form-group">
            <label>手机号 <span style="color:red">*</span></label>
            <input type="tel" id="phone" placeholder="11位手机号" maxlength="11">
        </div>
        <div class="form-group">
            <label>电子邮箱</label>
            <input type="email" id="email" placeholder="选填">
        </div>
        <div class="form-group full">
            <label>身份证号 <span style="color:red">*</span></label>
            <input type="text" id="idCard" placeholder="18位居民身份证号码" maxlength="18">
        </div>
    </div>

    <button class="btn-register" onclick="register()">立即注册</button>
    <div class="links">已有账户？<a href="/login">返回登录</a></div>
</div>

<script th:src="@{/static/js/api.js}"></script>
<script>
    async function register() {
        const username = document.getElementById('username').value.trim();
        const realName = document.getElementById('realName').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const phone = document.getElementById('phone').value.trim();
        const email = document.getElementById('email').value.trim();
        const idCard = document.getElementById('idCard').value.trim();

        if (!username || !realName || !password || !phone || !idCard) {
            showError('请填写所有必填项');
            return;
        }
        if (password !== confirmPassword) {
            showError('两次输入的密码不一致');
            return;
        }
        if (!/^1[3-9]\d{9}$/.test(phone)) {
            showError('请输入正确的手机号');
            return;
        }
        if (idCard.length !== 18) {
            showError('身份证号应为18位');
            return;
        }

        try {
            await apiPost('/api/auth/register', { username, realName, password, confirmPassword, phone, email: email || undefined, idCard });
            alert('注册成功！请登录');
            window.location.href = '/login';
        } catch (e) {
            showError(e.message || '注册失败，请稍后重试');
        }
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
    }
</script>
</body>
</html>
