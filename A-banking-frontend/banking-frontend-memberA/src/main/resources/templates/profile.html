<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息 - 网上银行系统</title>
    <link rel="stylesheet" th:href="@{/static/css/common.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="page-container" style="max-width:700px">
    <div class="page-header">
        <h2>个人信息</h2>
        <p class="subtitle">查看并管理您的账户信息</p>
    </div>

    <div class="card">
        <div style="display:flex;align-items:center;gap:20px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid #eee">
            <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#1a3a5c,#2d6a9f);
                        display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff">
                👤
            </div>
            <div>
                <div id="profileName" style="font-size:20px;font-weight:700;color:#1a3a5c"></div>
                <div id="profileRole" style="font-size:13px;color:#888;margin-top:4px"></div>
            </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
            <div class="detail-item">
                <span class="detail-label">用户名</span>
                <span class="detail-value" id="pUsername">-</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">真实姓名</span>
                <span class="detail-value" id="pRealName">-</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">用户ID</span>
                <span class="detail-value mono" id="pUserId">-</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">角色</span>
                <span class="detail-value" id="pRole">-</span>
            </div>
        </div>

        <div style="margin-top:28px;padding-top:20px;border-top:1px solid #eee">
            <h3 style="font-size:15px;margin:0 0 16px;color:#1a3a5c">安全设置</h3>
            <div style="display:flex;gap:12px;flex-wrap:wrap">
                <button class="btn btn-secondary" onclick="alert('修改密码功能请联系成员B实现')">修改密码</button>
                <button class="btn btn-secondary" onclick="alert('OTP设置请联系成员B实现')">OTP 设置</button>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/static/js/api.js}"></script>
<script th:src="@{/static/js/app.js}"></script>
<script>
    const userInfo = JSON.parse(localStorage.getItem('userInfo') || '{}');
    document.getElementById('profileName').textContent = userInfo.realName || userInfo.username || '-';
    document.getElementById('profileRole').textContent = userInfo.role === 'ADMIN' ? '系统管理员' : '普通用户';
    document.getElementById('pUsername').textContent  = userInfo.username || '-';
    document.getElementById('pRealName').textContent  = userInfo.realName || '-';
    document.getElementById('pUserId').textContent    = userInfo.userId   || '-';
    document.getElementById('pRole').textContent      = userInfo.role === 'ADMIN' ? '管理员' : '普通用户';
</script>
</body>
</html>
